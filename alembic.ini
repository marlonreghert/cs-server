# Alembic configuration for the RDS (Postgres) system-of-record.
# The database URL is supplied at runtime by migrations/env.py from app settings
# (env vars / config), so no credentials live in this file.
# Run migrations manually via SSM (never on container startup):
#   alembic upgrade head
# Offline SQL preview (no DB connection):
#   alembic upgrade head --sql
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
