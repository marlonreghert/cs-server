name: tests

# Offline test gate for cs-server. The unit + BDD suites run entirely against
# in-memory fakes (InMemoryRdsVenueStore, fakeredis) — no Postgres, Redis,
# network, secrets, or config file are required. Deploy stays in vibes_bot CI;
# this only gates correctness on PRs and pushes to main.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 matches the prod Dockerfile (python:3.13-slim); 3.12 is the
        # locally-verified baseline.
        python-version: ["3.12", "3.13"]
    name: tests (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Unit tests
        run: make test-unit PYTHON=python

      - name: BDD tests
        run: make test-bdd PYTHON=python
