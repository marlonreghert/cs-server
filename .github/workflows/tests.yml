name: tests

# Correctness gate for cs-server. The unit + BDD suites run against in-memory
# fakes (InMemoryRdsVenueStore, fakeredis). A Postgres service is also stood up
# and migrated so the eligibility serving-view parity test runs its SQL against
# REAL Postgres (RDS_TEST_URL) — the view SQL is never exercised by the fakes, so
# without this a broken view (e.g. an ambiguous column in CREATE VIEW) passes CI
# and only fails when applied to prod. Deploy stays in vibes_bot CI.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 matches the prod Dockerfile (python:3.13-slim); 3.12 is the
        # locally-verified baseline.
        python-version: ["3.12", "3.13"]
    name: tests (py${{ matrix.python-version }})
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vibesense
          POSTGRES_PASSWORD: vibesense
          POSTGRES_DB: vibesense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Migrate (alembic env.py reads these via app settings) + parity-test URL.
      RDS_HOST: localhost
      RDS_PORT: "5432"
      RDS_USER: vibesense
      RDS_PASSWORD: vibesense
      RDS_DB: vibesense_test
      RDS_SSLMODE: disable
      RDS_TEST_URL: postgresql+psycopg://vibesense:vibesense@localhost:5432/vibesense_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Applies every migration to the scratch Postgres, incl. the
      # serving.eligible_venue view. A bad CREATE VIEW fails the build here.
      - name: Migrate scratch Postgres
        run: alembic upgrade head

      - name: Unit tests
        run: make test-unit PYTHON=python

      - name: BDD tests
        run: make test-bdd PYTHON=python
